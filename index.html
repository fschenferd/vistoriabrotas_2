<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vistoria de Imóveis - TESTE</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (Development for better errors) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Remove html2pdf for now to simplify -->
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <noscript>
    <div class="max-w-xl mx-auto m-8 p-4 bg-yellow-100 text-yellow-900 rounded">
      Este app precisa de JavaScript para funcionar.
    </div>
  </noscript>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VistoriaApp() {
      const [vistorias, setVistorias] = useState([]);
      const [vistoriaAtual, setVistoriaAtual] = useState(null);
      const [tela, setTela] = useState('lista');

      // Carregar vistorias
      useEffect(() => {
        try {
          const saved = localStorage.getItem('vistorias_imoveis');
          if (saved) {
            setVistorias(JSON.parse(saved));
          }
        } catch (e) { console.error(e); }
      }, []);

      // Salvar automaticamente
      useEffect(() => {
        localStorage.setItem('vistorias_imoveis', JSON.stringify(vistorias));
      }, [vistorias]);

      const novaVistoria = () => {
        setVistoriaAtual({
          id: Date.now(),
          data: new Date().toISOString().split('T')[0],
          endereco: '',
          tipo: 'entrada',
          responsavel: '',
          itens: []
        });
        setTela('nova');
      };

      const salvarVistoria = () => {
        if (!vistoriaAtual.endereco.trim()) {
          alert('Por favor, preencha o endereço');
          return;
        }
        
        const novas = [...vistorias];
        const index = novas.findIndex(v => v.id === vistoriaAtual.id);
        if (index >= 0) novas[index] = { ...vistoriaAtual };
        else novas.push({ ...vistoriaAtual });
        
        setVistorias(novas);
        setTela('lista');
        setVistoriaAtual(null);
        alert('Salvo!');
      };

      const adicionarItem = () => {
        setVistoriaAtual(prev => ({
          ...prev,
          itens: [...prev.itens, { id: Date.now(), comodo: '', descricao: '', estado: 'bom', fotos: [] }]
        }));
      };

      const atualizarItem = (id, campo, valor) => {
        setVistoriaAtual(prev => ({
          ...prev,
          itens: prev.itens.map(item => item.id === id ? { ...item, [campo]: valor } : item)
        }));
      };

      const excluirVistoria = (id) => {
        if(confirm("Excluir?")) {
          setVistorias(vistorias.filter(v => v.id !== id));
        }
      };

      // --- TELA LISTA ---
      if (tela === 'lista') {
        return (
          <div className="min-h-screen bg-gray-50 p-4 pb-20">
            <div className="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6 mb-4">
              <div className="flex justify-between items-center">
                <h1 className="text-2xl font-bold text-gray-800">Vistorias (Simplificado)</h1>
                <button onClick={novaVistoria} className="bg-blue-600 text-white px-4 py-2 rounded">＋ Nova</button>
              </div>
              <p className="text-sm text-gray-600 mt-2">{vistorias.length} vistorias salvas.</p>
            </div>

            {vistorias.length === 0 ? (
              <div className="text-center text-gray-500 mt-10">Nenhuma vistoria. Clique em + Nova.</div>
            ) : (
              <div className="space-y-3 max-w-4xl mx-auto">
                {vistorias.map(v => (
                  <div key={v.id} className="bg-white p-4 rounded shadow flex justify-between items-center">
                    <div>
                      <h3 className="font-bold">{v.endereco}</h3>
                      <p className="text-sm text-gray-600">{v.data} • {v.tipo}</p>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => {setVistoriaAtual({...v}); setTela('nova')}} className="text-blue-600">Editar</button>
                      <button onClick={() => excluirVistoria(v.id)} className="text-red-600">🗑️</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      // --- TELA NOVA/EDITAR ---
      return (
        <div className="min-h-screen bg-gray-50 p-4 pb-32">
          <div className="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6 mb-4">
             <button onClick={() => setTela('lista')} className="mb-4 text-gray-600">← Voltar</button>
             <input 
               type="text" 
               value={vistoriaAtual.endereco} 
               onChange={e => setVistoriaAtual({...vistoriaAtual, endereco: e.target.value})}
               className="w-full p-2 border rounded mb-4"
               placeholder="Endereço do imóvel"
             />
             <input 
               type="date" 
               value={vistoriaAtual.data} 
               onChange={e => setVistoriaAtual({...vistoriaAtual, data: e.target.value})}
               className="w-full p-2 border rounded mb-4"
             />
             <select 
               value={vistoriaAtual.tipo} 
               onChange={e => setVistoriaAtual({...vistoriaAtual, tipo: e.target.value})}
               className="w-full p-2 border rounded mb-4"
             >
               <option value="entrada">Entrada</option>
               <option value="saida">Saída</option>
             </select>
          </div>

          <div className="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6 mb-4">
             <div className="flex justify-between mb-4">
                <h2 className="font-bold">Itens</h2>
                <button onClick={adicionarItem} className="bg-blue-600 text-white px-3 py-1 rounded">＋ Item</button>
             </div>
             
             {vistoriaAtual.itens.map((item, i) => (
                <div key={item.id} className="border p-3 rounded mb-3">
                   <h3 className="font-semibold">Item {i+1}</h3>
                   <input 
                     value={item.comodo} 
                     onChange={e => atualizarItem(item.id, 'comodo', e.target.value)}
                     className="w-full p-1 border rounded mt-1 mb-2" 
                     placeholder="Cômodo" 
                   />
                   <textarea 
                     value={item.descricao} 
                     onChange={e => atualizarItem(item.id, 'descricao', e.target.value)}
                     className="w-full p-1 border rounded" 
                     placeholder="Descrição" 
                   />
                </div>
             ))}
          </div>

          <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex gap-4 justify-center">
             <button onClick={() => setTela('lista')} className="bg-gray-300 px-6 py-2 rounded w-full">Cancelar</button>
             <button onClick={salvarVistoria} className="bg-blue-600 text-white px-6 py-2 rounded w-full">Salvar</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<VistoriaApp />);
  </script>
</body>
</html>
